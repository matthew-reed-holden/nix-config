# xsettingsd — pushes XSETTINGS to legacy XWayland apps so they
# inherit cursor, theme, font DPI from our Hyprland session.
# Launched at startup via autostart.conf.

Net/ThemeName "Adwaita-dark"
Net/IconThemeName "Tela-circle-dracula"
Gtk/CursorThemeName "Bibata-Modern-Ice"
Gtk/CursorThemeSize 20
Gtk/FontName "Work Sans 11"
Xft/Antialias 1
Xft/Hinting 1
Xft/HintStyle "hintslight"
Xft/RGBA "rgb"
Xft/DPI 98304
