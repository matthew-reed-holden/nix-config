# Hyprlock — port of ML4W's hyprlock.conf, adapted for our paths and
# Catppuccin Mocha. Wallpaper images live at ~/.cache/wallpaper/ —
# populated when we set up hyprpaper + wallpaper-driven phase. Until
# then the background path silently falls back; lock screen still
# functional but unstyled background.

# Cache folder for blurred + square wallpaper PNGs (filled later).
$cache_folder = $HOME/.cache/wallpaper

# ─── Colors (Catppuccin Mocha, mauve accent) ────────────
$primary    = rgba(cba6f7ff)   # mauve
$on_primary = rgba(11111bff)   # crust
$error      = rgba(f38ba8ff)   # red
$shadow     = rgba(00000099)
$background = rgba(1e1e2eff)   # base

general {
    ignore_empty_input = true
}

background {
    monitor =
    path    = $cache_folder/blurred_wallpaper.png
    color   = $background
}

input-field {
    monitor             =
    size                = 200, 50
    dots_size           = 0.33
    dots_spacing        = 0.15
    dots_center         = true
    dots_rounding       = -1
    inner_color         = $primary
    font_color          = $on_primary
    font_family         = Fira Sans Semibold
    outer_color         = $on_primary
    outline_thickness   = 3
    fade_on_empty       = true
    fade_timeout        = 1000
    placeholder_text    = <i>Input Password...</i>
    hide_input          = false
    rounding            = 10
    check_color         = $primary
    fail_color          = $error
    fail_text           = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color      = -1
    numlock_color       = -1
    bothlock_color      = -1
    invert_numlock      = false
    swap_font_color     = false
    position            = 0, -20
    halign              = center
    valign              = center
    shadow_passes       = 10
    shadow_size         = 20
    shadow_color        = $shadow
    shadow_boost        = 1.6
}

# Clock — bottom right, large
label {
    monitor       =
    text          = cmd[update:1000] echo "$TIME"
    color         = $primary
    font_size     = 70
    font_family   = Fira Sans Semibold
    position      = -50, 20
    halign        = right
    valign        = bottom
    shadow_passes = 5
    shadow_size   = 10
}

# Username — above clock
label {
    monitor       =
    text          = $USER
    color         = $primary
    font_size     = 20
    font_family   = Fira Sans Semibold
    position      = -50, 120
    halign        = right
    valign        = bottom
    shadow_passes = 5
    shadow_size   = 10
}

# Avatar / square wallpaper — center
image {
    monitor       =
    path          = $cache_folder/square_wallpaper.png
    size          = 280
    rounding      = 40
    border_size   = 4
    border_color  = $primary $on_primary 90deg
    rotate        = 0
    reload_time   = -1
    position      = 0, 200
    halign        = center
    valign        = center
    shadow_passes = 10
    shadow_size   = 20
    shadow_color  = $shadow
    shadow_boost  = 1.6
}
