# Autostart — programs launched once on Hyprland start.
# https://wiki.hyprland.org/Configuring/Keywords/#executing
#
# Wrapped in `uwsm app -- <cmd>` so each runs as a transient systemd
# user scope: logs go to journalctl, units bind to graphical-session
# .target (auto-stopped on session end), can be inspected via
# `systemctl --user list-units 'app-graphical-*'`.
#
# exec-once fires only at session start, NOT on hyprctl reload. To pick
# up changes here, log out and back in.

# ─── Notifications ──────────────────────────────────────
exec-once = uwsm app -- swaync

# ─── System trays / indicators ──────────────────────────
exec-once = uwsm app -- nm-applet --indicator
exec-once = uwsm app -- kdeconnect-indicator

# ─── Wallpaper / idle / bar ─────────────────────────────
exec-once = uwsm app -- awww-daemon
# select-wallpaper.sh applies + generates hyprlock blur/square cache.
exec-once = ~/.local/bin/select-wallpaper.sh ~/Pictures/wallpapers/Space-Nebula.png
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- waybar
exec-once = uwsm app -- xsettingsd
exec-once = uwsm app -- nwg-dock-hyprland -p bottom -lp end -nolauncher -i 24 -mb 6 -ml 6 -mr 6 -d

# ─── 1Password ──────────────────────────────────────────
# Autostart owned by ~/.config/autostart/1password.desktop, written by
# the GUI's "Start at login" toggle. Don't duplicate here — single-instance
# app no-ops the second invocation.

# ─── Polkit auth agent — already a systemd user unit; no uwsm wrap ──
exec-once = systemctl --user start hyprpolkitagent

# ─── Clipboard history daemons (Super+V via cliphist) ───
exec-once = uwsm app -- wl-paste --type text  --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# ─── Audio: pin ALC1220 analog line-out as default, unmuted ──
# WirePlumber sometimes re-mutes on profile/port shuffle (e.g., when
# the Yeti USB device toggles). Force port=lineout and unmute on login.
exec-once = sh -c 'SINK=alsa_output.pci-0000_7a_00.6.analog-stereo; for i in 1 2 3 4 5; do pactl list sinks short | grep -q "$SINK" && break; sleep 1; done; pactl set-default-sink "$SINK"; pactl set-sink-port "$SINK" analog-output-lineout; pactl set-sink-mute "$SINK" 0; pactl set-sink-volume "$SINK" 70%'
