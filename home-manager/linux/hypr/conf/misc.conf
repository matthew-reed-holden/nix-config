# Miscellaneous compositor behavior.
# https://wiki.hyprland.org/Configuring/Variables/#misc

misc {
    # VRR / G-Sync — 1 = fullscreen apps only (safe default for gaming
    # monitor + NVIDIA driver). 0 = off, 2 = always-on (some apps tear).
    vrr = 1

    # Window swallow — terminal hides when GUI app is launched from it,
    # restored when that app closes. swallow_regex picks which terminals
    # do this.
    enable_swallow = true
    swallow_regex  = ^(ghostty|kitty)$

    # Don't let apps grab focus by activation request (Slack notifications,
    # browser pop-ups, etc.). They get an attention indicator instead.
    focus_on_activate = false

    # Hide the "Hyprland v0.x" splash overlay on startup.
    disable_splash_rendering = true

    # Keep the anime mascot wallpaper on empty workspaces (set true to hide).
    disable_hyprland_logo = false

    # Wake the screen on mouse / keyboard input after DPMS sleep.
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true

    # Skip animations during manual drag-resize / drag-move for snappier feel.
    animate_manual_resizes        = false
    animate_mouse_windowdragging  = false

    # Let hyprpaper own the wallpaper; don't render a default.
    force_default_wallpaper = -1
}
