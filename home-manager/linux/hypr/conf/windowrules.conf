# Window rules — per-app behavior.
# https://wiki.hyprland.org/Configuring/Window-Rules/
#
# Hyprland 0.54+ requires block syntax (no inline `windowrule =`).

# ─── Carried over from EndeavourOS defaults ──────────────

# Ignore maximize requests from all apps.
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland.
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Float and reposition `hyprland-run` overlay.
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# ─── Float config dialogs / utility windows ──────────────

windowrule {
    name = float-config-dialogs
    # Match both short and reverse-domain class names (e.g. pavucontrol
    # vs org.pulseaudio.pavucontrol depending on packaging).
    match:class = ^(.*\.)?(pavucontrol|blueman-manager|nm-connection-editor)$
    float = yes
}

windowrule {
    name = float-polkit
    match:class = ^(.*polkit-.*)$
    float = yes
}

windowrule {
    name = float-calculators
    match:class = ^(org.gnome.Calculator|kcalc|gnome-calculator)$
    float = yes
}

windowrule {
    name = float-portal-pickers
    match:class = ^(xdg-desktop-portal-.*)$
    float = yes
}

# ─── Picture-in-Picture (Firefox / Chrome): float + pin on top ──

windowrule {
    name = float-pip
    match:title = ^(Picture-in-Picture)$
    float = yes
}

windowrule {
    name = pin-pip
    match:title = ^(Picture-in-Picture)$
    pin = yes
}

# NOTE: steam noblur / immediate rules dropped — block-syntax field
# names differ from inline form (`noblur` not valid as block field on
# Hyprland 0.54). Revisit when actually gaming on Steam.
