# Layout-specific tuning. Active layout selected in general.conf.
# https://wiki.hyprland.org/Configuring/Dwindle-Layout/
# https://wiki.hyprland.org/Configuring/Master-Layout/

dwindle {
    pseudotile      = true   # Super+P toggles pseudo-float in tile slot
    preserve_split  = true   # remember split direction across closes
    smart_resizing  = true   # neighbors compensate proportionally on resize
}

master {
    new_status = master      # new windows become the master pane
}
