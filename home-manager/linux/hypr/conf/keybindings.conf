# Keybindings — ML4W-flavored, scoped to apps/scripts we actually have.
# https://wiki.hyprland.org/Configuring/Binds/

$mainMod = SUPER

# ─── Apps ────────────────────────────────────────────────
bind = $mainMod,        RETURN, exec, $terminal                                                      # ghostty
bind = $mainMod,        B,      exec, firefox
bind = $mainMod,        E,      exec, $fileManager                                                   # dolphin
bind = $mainMod,        R,      exec, $menu                                                          # rofi -show drun
bind = $mainMod,        V,      exec, cliphist list | rofi -dmenu -config ~/.config/rofi/config-cliphist.rasi | cliphist decode | wl-copy   # clipboard history

# ─── Window mgmt ─────────────────────────────────────────
bind = $mainMod,        Q,      killactive
bind = $mainMod,        F,      fullscreen, 0
bind = $mainMod,        M,      fullscreen, 1                                                        # maximize (NOT exit)
bind = $mainMod,        T,      togglefloating
bind = $mainMod SHIFT,  T,      workspaceopt, allfloat                                               # toggle all-float on workspace
bind = $mainMod ALT,    T,      pin                                                                  # pin active window on top
bind = $mainMod,        P,      pseudo
bind = $mainMod,        J,      layoutmsg, togglesplit
bind = $mainMod,        K,      layoutmsg, swapsplit
bind = $mainMod,        G,      togglegroup
bind = $mainMod CTRL,   L,      exec, pidof hyprlock || hyprlock                                     # lock screen
bind = $mainMod,        N,      exec, swaync-client -t -sw                                          # toggle notification center
bind = $mainMod SHIFT,  W,      exec, /home/matthewholden/.local/bin/select-wallpaper.sh             # wallpaper picker
bind = $mainMod SHIFT,  T,      exec, /home/matthewholden/.local/bin/select-flavor.sh                # catppuccin flavor switcher (rofi)
bind = $mainMod CTRL,   R,      exec, hyprctl reload
bind = $mainMod SHIFT,  E,      exit                                                                 # exit Hyprland

# ─── Focus / move / resize ───────────────────────────────
bind = $mainMod,        left,   movefocus,    l
bind = $mainMod,        right,  movefocus,    r
bind = $mainMod,        up,     movefocus,    u
bind = $mainMod,        down,   movefocus,    d
bind = $mainMod SHIFT,  left,   resizeactive, -100 0
bind = $mainMod SHIFT,  right,  resizeactive,  100 0
bind = $mainMod SHIFT,  up,     resizeactive,  0 -100
bind = $mainMod SHIFT,  down,   resizeactive,  0  100
bind = $mainMod ALT,    left,   swapwindow,   l
bind = $mainMod ALT,    right,  swapwindow,   r
bind = $mainMod ALT,    up,     swapwindow,   u
bind = $mainMod ALT,    down,   swapwindow,   d

bindm = $mainMod,       mouse:272, movewindow                                                        # Super + LMB drag
bindm = $mainMod,       mouse:273, resizewindow                                                      # Super + RMB drag

binde = ALT,            Tab,    cyclenext                                                           # alt-tab cycle
binde = ALT,            Tab,    bringactivetotop

# ─── Workspaces 1..10 ────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod CTRL,  down, workspace, empty                                                       # jump to next empty ws
bind = $mainMod,       mouse_down, workspace, e+1
bind = $mainMod,       mouse_up,   workspace, e-1

# Special workspace (scratchpad)
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ─── Screenshots (rofi-driven menu) ──────────────────────
bind = ,        Print, exec, /home/matthewholden/.local/bin/screenshot.sh

# ─── Screen OCR (region → tesseract → clipboard) ─────────
bind = $mainMod ALT, O, exec, /home/matthewholden/.local/bin/ocr.sh

# ─── Keybinds cheatsheet ─────────────────────────────────
bind = $mainMod, slash, exec, /home/matthewholden/.local/bin/keybinds.sh   # Super+/ shows all binds in rofi

# ─── Media keys ──────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous

# ─── Brightness (laptop XF86 keys; no-op on desktop) ─────
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
