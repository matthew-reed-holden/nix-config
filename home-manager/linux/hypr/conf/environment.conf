# Environment variables exported to every Hyprland-spawned process.
# https://wiki.hyprland.org/Configuring/Environment-variables/
#
# Shell-only vars (PATH, EDITOR, etc.) belong in home.sessionVariables,
# not here — that path covers both shell + systemd user env which
# Hyprland inherits.

# ─── Cursor ─────────────────────────────────────────────
env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20

# ─── NVIDIA ─────────────────────────────────────────────
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_VRR_ALLOWED,1

# ─── Toolkits prefer Wayland (X fallback where given) ───
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt6ct          # Qt apps follow qt6ct config
