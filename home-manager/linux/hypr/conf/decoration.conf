# Window decoration — rounded corners, blur, shadows, opacity.
# https://wiki.hyprland.org/Configuring/Variables/#decoration

decoration {
    rounding = 10

    active_opacity     = 1.0
    inactive_opacity   = 0.85
    fullscreen_opacity = 1.0

    # Subtle dim on top of opacity for unfocused windows.
    dim_inactive = true
    dim_strength = 0.15

    # Blur — ML4W defaults: bigger kernel, more passes, ignore opacity
    # so background blur shows through transparent windows.
    blur {
        enabled           = true
        size              = 4
        passes            = 4
        new_optimizations = true
        ignore_opacity    = true
        xray              = true
    }

    # Shadow — ML4W defaults: wide soft shadow, low alpha.
    shadow {
        enabled      = true
        range        = 32
        render_power = 2
        color        = rgba(00000050)
    }
}
