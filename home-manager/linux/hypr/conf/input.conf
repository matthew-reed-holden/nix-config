# Input configuration.
# https://wiki.hyprland.org/Configuring/Variables/#input

input {
    # Keyboard
    kb_layout  = us
    kb_variant =
    kb_model   =
    kb_options = ctrl:nocaps     # Caps Lock acts as Ctrl
    kb_rules   =

    # Key repeat — faster than default (25cps / 600ms).
    repeat_rate  = 45
    repeat_delay = 250

    numlock_by_default = false

    # Mouse
    follow_mouse  = 1
    sensitivity   = 0            # -1.0 to 1.0, 0 = unmodified
    accel_profile = flat         # raw, no acceleration curve

    # Touchpad — irrelevant on desktop but harmless / portable.
    touchpad {
        natural_scroll = false
    }
}

# Trackpad gestures (no-op on desktop).
gesture = 3, horizontal, workspace
