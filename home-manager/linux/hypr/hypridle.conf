# Hypridle — idle/lock/DPMS timeouts. Adapted from ML4W's config.
# Brightness/keyboard-backlight listeners dropped (desktop = no
# backlight). Suspend dropped (desktop doesn't sleep). Re-add either
# section on a laptop port.

general {
    # Avoid spawning multiple hyprlock instances.
    lock_cmd         = pidof hyprlock || hyprlock
    # Lock before suspend (no-op on desktop without suspend listener).
    before_sleep_cmd = loginctl lock-session
    # Restore display after wake — avoids needing a second keypress.
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# Lock screen at 10 minutes idle.
listener {
    timeout    = 600
    on-timeout = loginctl lock-session
}

# Turn off display at 11 minutes idle. Resume turns it back on.
listener {
    timeout    = 660
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
